name: Refresh Daily Puzzles

on:
  schedule:
    - cron: "5 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Regenerate daily puzzle calendar
        run: |
          node scripts/generate-daily-puzzles.mjs

      - name: Commit updated puzzle files
        run: |
          if git diff --quiet -- data/puzzle-source.json data/puzzles.json; then
            echo "No puzzle updates to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/puzzle-source.json data/puzzles.json
          git commit -m "Refresh CharterSchoodle daily puzzles"
          git push
